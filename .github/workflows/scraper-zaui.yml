name: Zaui Scrapers

# Dedicated cron for Zaui-platform providers. Runs once daily and covers
# the full catalogue of every provider in a single window by walking
# groups 0..3 sequentially per scraper, then validating once at the end.
# Running all groups inside one workflow run keeps `scraper_run_log` rows
# apples-to-apples (one row per provider per day = full catalog count),
# which clears the Initiative 7 false-positive count-drop badge.

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
      RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Vancouver Mountain Guides
        run: for g in 0 1 2 3; do python scraper_vanmtnguides.py --group $g || true; done
        continue-on-error: true
      - name: Validate Vancouver Mountain Guides
        run: python validate_provider.py vanmtnguides
        continue-on-error: true

      - name: Banff Adventures
        run: for g in 0 1 2 3; do python scraper_banff_adventures.py --group $g || true; done
        continue-on-error: true
      - name: Validate Banff Adventures
        run: python validate_provider.py banff-adventures
        continue-on-error: true

      - name: Mt. Norquay
        run: for g in 0 1 2 3; do python scraper_mt_norquay.py --group $g || true; done
        continue-on-error: true
      - name: Validate Mt. Norquay
        run: python validate_provider.py mt-norquay
        continue-on-error: true

      - name: Canmore Adventures
        run: for g in 0 1 2 3; do python scraper_canmore_adventures.py --group $g || true; done
        continue-on-error: true
      - name: Validate Canmore Adventures
        run: python validate_provider.py canmore-adventures
        continue-on-error: true

      - name: Toby Creek Adventures
        run: for g in 0 1 2 3; do python scraper_toby_creek_adventures.py --group $g || true; done
        continue-on-error: true
      - name: Validate Toby Creek Adventures
        run: python validate_provider.py toby-creek-adventures
        continue-on-error: true

      # ── Future Zaui providers — uncomment + rename as added ─────────────────
      # - name: Provider Name
      #   run: for g in 0 1 2 3; do python scraper_PROVIDER.py --group $g || true; done
      #   continue-on-error: true
      # - name: Validate Provider Name
      #   run: python validate_provider.py PROVIDER
      #   continue-on-error: true
