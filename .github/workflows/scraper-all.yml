name: Scrape All

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:          ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY:  ${{ secrets.SUPABASE_SERVICE_KEY }}
      RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v3
      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright anthropic
          playwright install chromium
      - name: Altus
        run: python scraper_altus.py
        continue-on-error: true
      - name: MSAA
        run: python scraper_msaa.py
        continue-on-error: true
      - name: CWMS
        run: python scraper_cwms.py
        continue-on-error: true
      - name: Summit
        run: python scraper_summit.py
        continue-on-error: true
      - name: IAG
        run: python scraper_iag.py
        continue-on-error: true
      - name: HVI
        run: python scraper_hvi.py
        continue-on-error: true
      - name: SRG
        run: python scraper_srg.py
        continue-on-error: true
      - name: Skaha Rock Adventures
        run: python scraper_skaha_rock_adventures.py
        continue-on-error: true
      - name: AAA
        run: python scraper_aaa.py
        continue-on-error: true
      - name: AAA Details
        run: python scraper_aaa_details.py
        continue-on-error: true
      - name: BSA
        run: python scraper_bsa.py
        continue-on-error: true
      - name: JHT
        run: python scraper_jht.py
        continue-on-error: true
      - name: Yamnuska
        run: python scraper_yamnuska.py
        continue-on-error: true
