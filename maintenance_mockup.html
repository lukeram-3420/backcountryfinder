<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Maintenance state mockup — BackcountryFinder</title>
<style>
  :root {
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    --bg: #f5f4f0;
    --bg-card: #ffffff;
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-tertiary: #888;
    --border: #e8e7e3;
    --border-mid: #d5d4cf;
    --green-dark: #1a2e1a;
    --green-accent: #4ade80;
    --green-light: #eaf3de;
    --radius: 10px;
    --radius-sm: 8px;
    --radius-pill: 20px;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  /* Topnav (stripped-down clone of index.html topnav) */
  .topnav {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 0 36px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topnav-logo { font-size: 18px; font-family: Georgia, serif; color: var(--green-dark); letter-spacing: -0.3px; }
  .topnav-logo em { color: var(--green-accent); font-style: italic; }
  .topnav-links { display: flex; gap: 4px; }
  .nav-link { padding: 7px 16px; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-radius: var(--radius-pill); cursor: pointer; }
  .nav-link.active { background: var(--green-light); color: var(--green-dark); }

  /* Hero + search bar */
  .hero {
    background: var(--green-dark);
    padding: 52px 36px 44px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hero-inner { display: flex; flex-direction: column; align-items: flex-start; max-width: 860px; width: 100%; }
  .hero-tagline { font-size: clamp(28px, 5vw, 42px); font-weight: 700; color: #fff; line-height: 1.25; margin-bottom: 6px; letter-spacing: -0.5px; }
  .hero-tagline em { color: var(--green-accent); font-style: normal; }
  .hero-sub { font-size: 15px; font-weight: 400; font-style: italic; color: rgba(255,255,255,0.4); margin-bottom: 32px; }
  .search-bar {
    background: #fff;
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    align-items: stretch;
    max-width: 860px;
    width: 100%;
  }
  .search-field { padding: 14px 20px; border-right: 1px solid #f0f0f0; cursor: pointer; flex: 1; display: flex; flex-direction: column; gap: 3px; }
  .search-field label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #aaa; }
  .search-field .value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .search-go {
    background: var(--green-accent);
    color: var(--green-dark);
    border: none;
    padding: 0 28px;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--font);
    cursor: pointer;
  }

  /* Main */
  .main { max-width: 1200px; margin: 0 auto; padding: 28px 36px 120px; }

  /* MAINTENANCE EMPTY STATE — mockup */
  .empty-state {
    grid-column: 1/-1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 72px 24px;
  }
  .empty-state .empty-icon {
    font-size: 52px;
    margin-bottom: 18px;
    line-height: 1;
  }
  .empty-state h3 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    margin: 0 0 8px;
    letter-spacing: -0.3px;
  }
  .empty-state p {
    font-size: 14px;
    color: var(--text-tertiary);
    max-width: 340px;
    line-height: 1.6;
    margin: 0 0 20px;
  }

  /* "Scraper running now" pill with pulsing green dot */
  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--green-light);
    border: 1px solid #c0dd97;
    color: #2d6a11;
    padding: 6px 14px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 600;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7);
    animation: pulse 1.8s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.7); }
    70%  { box-shadow: 0 0 0 8px rgba(74, 222, 128, 0); }
    100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-logo">backcountry<em>finder</em></div>
  <div class="topnav-links">
    <div class="nav-link active">search</div>
    <div class="nav-link">my list</div>
    <div class="nav-link">providers</div>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-tagline">Find your <em>course</em><br>Find your <em>adventure</em></div>
    <div class="hero-sub">Without the 20 open tabs.</div>
    <div class="search-bar">
      <div class="search-field"><label>I want to</label><div class="value">Everything backcountry</div></div>
      <div class="search-field"><label>Where</label><div class="value">Anywhere</div></div>
      <div class="search-field"><label>From</label><div class="value">tomorrow</div></div>
      <button class="search-go">Go</button>
    </div>
  </div>
</div>

<div class="main">

  <!-- MAINTENANCE EMPTY STATE MOCKUP -->
  <div class="empty-state">
    <div class="empty-icon">🏔</div>
    <h3>Updating course listings</h3>
    <p>We're pulling in fresh data. Check back in about 45 minutes.</p>
    <div class="status-pill">
      <span class="status-dot"></span>
      <span>Scraper running now</span>
    </div>
  </div>

</div>

</body>
</html>
